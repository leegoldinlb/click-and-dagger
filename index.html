<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CLICK &amp; DAGGER</title>
<link rel="stylesheet" href="style.css?v=7">
</head>
<body>
<div id="game">
  <div id="viewwrap">
    <canvas id="view" width="640" height="360"></canvas>
    <div id="crosshair">+</div>
    <div id="hoverlabel"></div>
    <div id="message"></div>
    <div id="overlay">
      <img class="splashart" src="assets/ui/splash.png?v=1" alt="CLICK AND DAGGER">
      <p class="tag" id="customtag" style="display:none">&#9656; CUSTOM MISSION LOADED &#9666;</p>
      <button id="startbtn">[ BEGIN MISSION ]</button>
      <a id="editorlink" href="editor.html">LAIR ARCHITECT &mdash; BUILD YOUR OWN MISSION</a>
    </div>
  </div>
  <div id="hud">
    <div id="stats">
      <span class="stat">HP <b id="hp">100</b></span>
      <span class="stat"><b id="weapon">WALTHER PPK</b> AMMO <b id="ammo">24</b></span>
      <span class="stat">COVER <b id="cover">UNDERCOVER</b></span>
    </div>
    <div id="verbs">
      <button class="verb active" data-verb="look">LOOK</button>
      <button class="verb" data-verb="take">TAKE</button>
      <button class="verb" data-verb="use">USE</button>
      <button id="drawgun">&#10022; DRAW WALTHER</button>
    </div>
    <div id="inventory"><span id="invempty">FIELD KIT: EMPTY</span></div>
  </div>
  <div id="modeline">COMBAT MODE — right-click to holster &amp; point-and-click</div>
</div>
<script src="js/audio.js?v=6"></script>
<script src="js/music.js?v=1"></script>
<script src="js/world.js?v=105"></script>
<script src="js/engine.js?v=45"></script>
<script src="js/adventure.js?v=33"></script>
<script src="js/main.js?v=29"></script>
</body>
</html>
